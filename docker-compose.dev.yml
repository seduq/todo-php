services:
  # PHP-FPM Service
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.dev
    container_name: todoapp_php_dev
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./app:/var/www/html
      - php_logs:/var/log/php-fpm
      # Persist bash history for devcontainer
      - bash_history:/root/.bash_history_data
    environment:
      - DEBUG=true
      - SECURITY_SALT=d58a36edc6d39c768f4f573cbc78fa97b031b
      - DATABASE_HOST=mysql
      - DATABASE_PORT=3306
      - DATABASE_USER=todoapp
      - DATABASE_PASSWORD=todoapp_password
      - DATABASE_NAME=todoapp
      # Enable command history
      - PROMPT_COMMAND=history -a
      - HISTFILE=/root/.bash_history_data/.bash_history
    networks:
      - todoapp_network
    depends_on:
      mysql:
        condition: service_healthy
    # Keep container running for devcontainer
    command: sh -c "php-fpm"

  # Nginx Service
  nginx:
    image: nginx:alpine
    container_name: todoapp_nginx_dev
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./app:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - nginx_logs:/var/log/nginx
    networks:
      - todoapp_network
    depends_on:
      - php

  # MySQL Service
  mysql:
    image: mysql:8.0
    container_name: todoapp_mysql_dev
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_USER: todoapp
      MYSQL_DATABASE: todoapp
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_PASSWORD: todoapp_password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf
      - mysql_logs:/var/log/mysql
    networks:
      - todoapp_network
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-proot_password",
        ]
      timeout: 5s
      retries: 10
      interval: 3s
      start_period: 30s

  # PHPMyAdmin Service (Development only)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: todoapp_phpmyadmin_dev
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root_password
      UPLOAD_LIMIT: 20M
    networks:
      - todoapp_network
    depends_on:
      - mysql

networks:
  todoapp_network:
    driver: bridge
    name: todoapp_network

volumes:
  mysql_data:
    driver: local
    name: todoapp_mysql_data_dev
  mysql_logs:
    driver: local
    name: todoapp_mysql_logs_dev
  php_logs:
    driver: local
    name: todoapp_php_logs_dev
  nginx_logs:
    driver: local
    name: todoapp_nginx_logs_dev
  bash_history:
    driver: local
    name: todoapp_bash_history_dev
